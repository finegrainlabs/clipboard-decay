name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install GLib tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate release metadata
        run: npm run check:release

      - name: Build extension zip
        run: ./scripts/package.sh

      - name: Prepare release assets
        id: release_meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="$TAG_NAME"
          uuid=$(python3 -c 'import json; print(json.load(open("metadata.json"))["uuid"])')
          source_zip="${uuid}.zip"
          release_zip="${uuid}-${tag}.zip"
          checksum_file="${release_zip}.sha256"

          mv "$source_zip" "$release_zip"
          sha256sum "$release_zip" > "$checksum_file"

          {
            echo "tag=${tag}"
            echo "release_zip=${release_zip}"
            echo "checksum_file=${checksum_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes footer
        id: release_notes
        env:
          RELEASE_ZIP: ${{ steps.release_meta.outputs.release_zip }}
          CHECKSUM_FILE: ${{ steps.release_meta.outputs.checksum_file }}
        run: |
          set -euo pipefail

          cat <<EOF >> "$GITHUB_OUTPUT"
          body<<__BODY__
          ## Assets
          - `${RELEASE_ZIP}` - packaged GNOME Shell extension zip
          - `${CHECKSUM_FILE}` - SHA-256 checksum for the zip
          __BODY__
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            ${{ steps.release_meta.outputs.release_zip }}
            ${{ steps.release_meta.outputs.checksum_file }}
