name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install GLib tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate release metadata
        run: npm run check:release

      - name: Build extension zip
        run: ./scripts/package.sh

      - name: Resolve release metadata
        id: release_meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          metadata = json.loads(Path('metadata.json').read_text())
          tag = Path('${{ github.ref_name }}').name

          print(f"tag_name={tag}")
          print(f"release_name={tag}")
          print(f"asset_path={metadata['uuid']}.zip")
          print(f"asset_name={metadata['uuid']}.zip")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          files: ${{ steps.release_meta.outputs.asset_path }}
