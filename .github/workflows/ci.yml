name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install GLib tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run coverage
        run: npm run coverage

      - name: Validate release metadata and import boundaries
        run: npm run check:release

      - name: Validate schema compilation
        run: glib-compile-schemas --strict schemas

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: .coverage/

  package:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install GLib tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin

      - name: Build extension zip
        run: ./scripts/package.sh

      - name: Validate zip contents
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import zipfile

          root = pathlib.Path('.')
          metadata = json.loads((root / 'metadata.json').read_text())
          zip_path = root / f"{metadata['uuid']}.zip"

          required = {
              'LICENSE',
              'NOTICE',
              'README.md',
              'extension.js',
              'metadata.json',
              'prefs.js',
              'utils.js',
              'schemas/gschemas.compiled',
              f"schemas/{metadata['settings-schema']}.gschema.xml",
          }
          forbidden_prefixes = (
              '.git/',
              '.github/',
              '.coverage/',
              '.build/',
              'node_modules/',
              'scripts/',
              'tests/',
          )

          with zipfile.ZipFile(zip_path) as zf:
              names = set(zf.namelist())
              packaged_metadata = json.loads(zf.read('metadata.json').decode())

          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Missing required packaged files: {missing}")

          unexpected = sorted(name for name in names if name.startswith(forbidden_prefixes))
          if unexpected:
              raise SystemExit(f"Found unexpected packaged files: {unexpected}")

          version_name = packaged_metadata.get('version-name', '')
          if not re.fullmatch(r'(?!^[. ]+$)[A-Za-z0-9 .]{1,16}', version_name):
              raise SystemExit(f"Packaged metadata has invalid version-name: {version_name!r}")

          if 'version' in packaged_metadata:
              raise SystemExit('Packaged metadata must not include deprecated version')

          print(f"Validated {zip_path} with {len(names)} files")
          PY

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: clipboard-decay@*.zip
